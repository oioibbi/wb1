<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>随机网站</title>
    <!-- Inline CSS to avoid GitHub Pages path/case issues -->
    <style>
      :root {
        --bg: #0b0c10;
        --panel: #11131a;
        --text: #e9ecf1;
        --muted: #a4acb9;
        --border: rgba(255, 255, 255, 0.12);
        --primary: #6ee7ff;
        --primary2: #8b5cf6;
        --danger: #ff5c7a;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
        --radius: 16px;
        --glass-rgb: 17, 19, 26;
        --glass-alpha: 0.62;
        --stroke-rgb: 255, 255, 255;
        --stroke-alpha: calc(var(--glass-alpha) * 0.28);
        --stroke: rgba(var(--stroke-rgb), var(--stroke-alpha));
        --soft-alpha: calc(var(--glass-alpha) * 0.22);
        --soft: rgba(var(--glass-rgb), var(--soft-alpha));
        --chip-alpha: calc(var(--glass-alpha) * 0.18);
        --chip: rgba(var(--glass-rgb), var(--chip-alpha));
        --glass-border: var(--stroke);
        --bg-dim: 0.38;
        --bg-sat: 1.1;
        --bg-blur: 0px;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f7f7fb;
          --panel: #ffffff;
          --text: #12131a;
          --muted: #5b6270;
          --border: rgba(0, 0, 0, 0.1);
          --shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
          --glass-rgb: 255, 255, 255;
          --glass-alpha: 0.72;
          --stroke-rgb: 0, 0, 0;
          --glass-border: var(--stroke);
          --bg-dim: 0.18;
          --bg-sat: 1.05;
        }
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        background: var(--bg);
        color: var(--text);
      }

      /* Photo background layer */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -2;
        background-image: url("./assets/bg.jpg");
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        transform: scale(1.02);
        filter: saturate(var(--bg-sat)) blur(var(--bg-blur));
        opacity: 1;
      }

      /* Readability overlay (keeps photo visible) */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background: radial-gradient(1100px 720px at 18% 8%, rgba(139, 92, 246, 0.26), transparent 62%),
          radial-gradient(1000px 820px at 92% 22%, rgba(110, 231, 255, 0.22), transparent 58%),
          radial-gradient(1100px 820px at 45% 105%, rgba(255, 92, 122, 0.16), transparent 58%),
          rgba(0, 0, 0, var(--bg-dim));
        pointer-events: none;
      }

      #app {
        max-width: 920px;
        margin: 0 auto;
        padding: 40px 20px 56px;
      }

      .header {
        margin-bottom: 16px;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }

      @media (min-width: 980px) {
        #app {
          max-width: 1100px;
        }
        .layout {
          grid-template-columns: 1.15fr 0.85fr;
          align-items: start;
        }
        .right {
          position: sticky;
          top: 14px;
        }
      }

      h1 {
        margin: 0 0 10px 0;
        font-size: 40px;
        letter-spacing: -0.02em;
      }

      .muted {
        color: var(--muted);
      }

      .small {
        font-size: 13px;
      }

      .panel {
        margin-top: 18px;
        padding: 18px;
        background: rgba(var(--glass-rgb), var(--glass-alpha));
        border: 1px solid var(--glass-border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px) saturate(1.18);
        -webkit-backdrop-filter: blur(14px) saturate(1.18);
      }

      .card {
        margin-top: 0;
      }

      .card-title {
        font-weight: 750;
        margin-bottom: 10px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 12px 10px;
        border-radius: 12px;
        user-select: none;
      }

      .row:hover {
        background: rgba(255, 255, 255, 0.06);
      }

      .row-main {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .row-title {
        font-weight: 650;
      }

      .row-desc {
        font-size: 13px;
      }

      .row-control input[type="checkbox"] {
        width: 44px;
        height: 24px;
        accent-color: color-mix(in oklab, var(--primary), var(--primary2) 35%);
      }

      hr {
        border: 0;
        border-top: 1px solid var(--border);
        margin: 14px 0;
      }

      .label {
        font-weight: 650;
      }

      .chips {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .segmented {
        margin-top: 10px;
        display: inline-flex;
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        overflow: hidden;
        background: var(--soft);
      }

      button.seg {
        border: 0;
        border-right: 1px solid var(--border);
        border-radius: 0;
        padding: 10px 12px;
        background: transparent;
      }

      button.seg:last-child {
        border-right: 0;
      }

      button.seg.active {
        background: linear-gradient(
          90deg,
          color-mix(in oklab, var(--primary), transparent 20%),
          color-mix(in oklab, var(--primary2), transparent 25%)
        );
        color: #061018;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid var(--glass-border);
        background: var(--chip);
        cursor: pointer;
        user-select: none;
      }

      .chip input {
        width: 16px;
        height: 16px;
        accent-color: color-mix(in oklab, var(--primary), var(--primary2) 35%);
      }

      .buttons {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      .buttons.buttons-tight {
        margin-top: 10px;
        gap: 10px;
      }

      button {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 14px;
        font-weight: 650;
        cursor: pointer;
        background: transparent;
        color: var(--text);
      }

      button.primary {
        border: 0;
        background: linear-gradient(90deg, var(--primary), var(--primary2));
        color: #061018;
      }

      button.secondary {
        background: rgba(var(--glass-rgb), calc(var(--glass-alpha) * 0.26));
      }

      button.ghost {
        border-color: color-mix(in oklab, var(--glass-border), rgba(255, 255, 255, 0.28) 30%);
      }

      .result,
      .last-pick {
        margin-top: 18px;
        padding: 16px 18px;
        border-radius: var(--radius);
        border: 1px solid var(--glass-border);
        background: var(--soft);
        backdrop-filter: blur(14px) saturate(1.18);
        -webkit-backdrop-filter: blur(14px) saturate(1.18);
      }

      .divider {
        height: 1px;
        background: var(--border);
        margin: 14px 0;
      }

      .value {
        display: inline-block;
        margin-top: 8px;
        word-break: break-word;
        color: color-mix(in oklab, var(--primary), var(--primary2) 35%);
        text-decoration: none;
      }

      .value:hover {
        text-decoration: underline;
      }

      .confirm-row {
        margin-top: 12px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .hidden {
        display: none;
      }

      .footer {
        margin-top: 18px;
      }

      .textarea {
        width: 100%;
        min-height: 110px;
        margin-top: 10px;
        padding: 12px 12px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: color-mix(in oklab, var(--panel), rgba(255, 255, 255, 0.04) 10%);
        color: var(--text);
        resize: vertical;
        outline: none;
      }

      .textarea:focus {
        border-color: color-mix(in oklab, var(--primary), var(--primary2) 35%);
      }

      .textarea.textarea-sm {
        min-height: 90px;
      }

      details.details {
        margin-top: 10px;
        padding: 10px 12px;
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        background: var(--soft);
        backdrop-filter: blur(14px) saturate(1.18);
        -webkit-backdrop-filter: blur(14px) saturate(1.18);
      }

      .slider {
        display: grid;
        gap: 8px;
        margin-top: 10px;
        padding: 12px 12px;
        border-radius: 14px;
        border: 1px solid var(--glass-border);
        background: var(--soft);
      }

      .slider-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .pill {
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--glass-border);
        background: var(--chip);
        color: var(--muted);
        white-space: nowrap;
      }

      details.opacity-dock {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 14px;
        width: min(520px, calc(100vw - 28px));
        z-index: 30;
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        background: rgba(var(--glass-rgb), 0.72);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px) saturate(1.18);
        -webkit-backdrop-filter: blur(14px) saturate(1.18);
        overflow: hidden;
      }

      summary.opacity-dock-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        cursor: pointer;
        user-select: none;
        font-weight: 750;
        list-style: none;
      }

      summary.opacity-dock-summary::-webkit-details-marker {
        display: none;
      }

      details.opacity-dock[open] summary.opacity-dock-summary {
        border-bottom: 1px solid var(--glass-border);
      }

      details.opacity-dock .slider {
        margin: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
      }

      input[type="range"] {
        width: 100%;
        accent-color: color-mix(in oklab, var(--primary), var(--primary2) 35%);
      }

      summary.details-summary {
        cursor: pointer;
        font-weight: 650;
        list-style: none;
      }

      details.details[open] summary.details-summary {
        margin-bottom: 8px;
      }

      summary.details-summary::-webkit-details-marker {
        display: none;
      }

      .custom-row {
        padding: 10px 0;
        border-top: 1px dashed color-mix(in oklab, var(--border), rgba(255, 255, 255, 0.08) 60%);
      }

      .custom-row:first-child {
        border-top: 0;
      }

      .custom-row-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 0.95em;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- Cache-bust for GitHub Pages deployments -->
    <script src="./app.js?v=20260312-5"></script>
  </body>
</html>
